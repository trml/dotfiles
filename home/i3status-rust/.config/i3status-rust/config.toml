#icons_format = "{icon}"

[theme]
theme = "solarized-dark"
[theme.overrides]
idle_bg = "#123456"
idle_fg = "#abcdef"

[icons]
#icons = "awesome4"
[icons.overrides]
bat = ["|E|", "|_|", "|=|", "|F|"]
bat_charging = "|^| "

[[block]]
block = "cpu"

[[block]]
block = "memory"
format = " $icon $mem_total_used.eng(w:2) "
format_alt = " $icon_swap $swap_used.eng(w:2) "

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 20
warning = 20.0
alert = 10.0
format = " $icon $available.eng(w:4) "

[[block]]
block = "custom"
command = "echo POW $(sensors 'corsairpsu-*' | grep 'power total:' | awk '{print $3}' | rev | cut -c 4- | rev)W"
hide_when_empty = true
interval = 5

[[block]]
block = "custom"
command = "echo VRAM $(amdgpu_top -d -J | jq '.[0].VRAM.\"Total VRAM Usage\".value' | numfmt --from=iec --from-unit=1048576 --to=si --format='%.1f')B"
hide_when_empty = true
interval = 5

[[block]]
block = "custom"
command = "echo GPU $(amdgpu_top -d -J | jq '.[0].Sensors.\"Average Power\".value')W"
hide_when_empty = true
interval = 5

[[block]]
block = "sound"
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%a %d/%m/%y %R') "
